services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - aep_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../automation:/automation
      - visual_qa_data:/app/visual_qa_data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      AUTOMATION_ROOT: /automation
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_API_KEYS: ${GOOGLE_API_KEYS:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-}
      VISUAL_AUDIT_ENABLED: ${VISUAL_AUDIT_ENABLED:-false}
      VISUAL_DATA_DIR: /app/visual_qa_data
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      FIGMA_API_TOKEN: ${FIGMA_API_TOKEN:-}
      VISUAL_LLM_PRIMARY: ${VISUAL_LLM_PRIMARY:-gemini/gemini-3.5-flash}
      VISUAL_LLM_FALLBACKS: ${VISUAL_LLM_FALLBACKS:-gemini/gemini-2.5-flash}
      VISUAL_LLM_TIMEOUT_S: ${VISUAL_LLM_TIMEOUT_S:-120}
      VISUAL_LLM_MAX_RETRIES: ${VISUAL_LLM_MAX_RETRIES:-2}
      VISUAL_DIFF_THRESHOLD: ${VISUAL_DIFF_THRESHOLD:-0.1}
      VISUAL_DIFF_MIN_REGION_PX: ${VISUAL_DIFF_MIN_REGION_PX:-64}
      VISUAL_FAIL_MISMATCH_PCT: ${VISUAL_FAIL_MISMATCH_PCT:-1.0}
      VISUAL_VIDEO_MODEL: ${VISUAL_VIDEO_MODEL:-gemini-3.5-flash}
      VISUAL_VIDEO_FALLBACK: ${VISUAL_VIDEO_FALLBACK:-gemini-2.5-flash}
      VISUAL_VIDEO_MAX_MB: ${VISUAL_VIDEO_MAX_MB:-100}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aep_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    # -B runs Celery Beat embedded in this same process (safe here since only
    #    one celery_worker instance/replica runs — beat schedule is defined in
    #    celery_app.py and currently just handles periodic stale-run reconciliation).
    # --concurrency is now explicit instead of Celery's implicit CPU-count
    #    default, so cross-suite parallelism is a documented, tunable knob
    #    (CELERY_CONCURRENCY in .env) rather than an accident of the host's
    #    reported CPU count.
    command: celery -A app.workers.celery_app:celery_app worker -B --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    volumes:
      - ../automation:/automation
      - visual_qa_data:/app/visual_qa_data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      AUTOMATION_ROOT: /automation
      PABOT_PROCESSES: ${PABOT_PROCESSES:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_API_KEYS: ${GOOGLE_API_KEYS:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-}
      VISUAL_AUDIT_ENABLED: ${VISUAL_AUDIT_ENABLED:-false}
      VISUAL_DATA_DIR: /app/visual_qa_data
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      FIGMA_API_TOKEN: ${FIGMA_API_TOKEN:-}
      VISUAL_LLM_PRIMARY: ${VISUAL_LLM_PRIMARY:-gemini/gemini-3.5-flash}
      VISUAL_LLM_FALLBACKS: ${VISUAL_LLM_FALLBACKS:-gemini/gemini-2.5-flash}
      VISUAL_LLM_TIMEOUT_S: ${VISUAL_LLM_TIMEOUT_S:-120}
      VISUAL_LLM_MAX_RETRIES: ${VISUAL_LLM_MAX_RETRIES:-2}
      VISUAL_DIFF_THRESHOLD: ${VISUAL_DIFF_THRESHOLD:-0.1}
      VISUAL_DIFF_MIN_REGION_PX: ${VISUAL_DIFF_MIN_REGION_PX:-64}
      VISUAL_FAIL_MISMATCH_PCT: ${VISUAL_FAIL_MISMATCH_PCT:-1.0}
      VISUAL_VIDEO_MODEL: ${VISUAL_VIDEO_MODEL:-gemini-3.5-flash}
      VISUAL_VIDEO_FALLBACK: ${VISUAL_VIDEO_FALLBACK:-gemini-2.5-flash}
      VISUAL_VIDEO_MAX_MB: ${VISUAL_VIDEO_MAX_MB:-100}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aep_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      FASTAPI_URL: http://backend:8000
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      - backend
    networks:
      - aep_network

  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./docker/ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - frontend
      - backend
    networks:
      - aep_network

networks:
  aep_network:
    driver: bridge

volumes:
  # Shared between backend (API uploads) and celery_worker (SOW/video/Figma
  # parsing, screenshot capture) — without this the worker can't see files
  # the API wrote, and vice versa for generated screenshots/diffs.
  visual_qa_data:
